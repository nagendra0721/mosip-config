server.tomcat.threads.max=260
server.tomcat.threads.min-spare=80
server.tomcat.accept-count=160
mosip.kernel.webclient.exchange.strategy.max-in-memory-size.mbs=16
logging.level.io.mosip.commons.khazana=INFO
software.amazon.awssdk.request=DEBUG
