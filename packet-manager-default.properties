spring.redis.port=6379
management.health.redis.enabled=false
spring.redis.password=mosip123
spring.cache.redis.time-to-live=2700000
mosip.kernel.http.selftoken.restTemplate.max-connection-per-route=70
mosip.kernel.http.selftoken.restTemplate.total-max-connections=500

packetmanager.cache.info.enabled=true
object.store.max.connection=180
object.store.connection.max.retry=2
object.store.connection.timeout=4000
object.store.socket.timeout=7000
object.store.client.execution.timeout=12000

logging.level.com.amazonaws.metrics=DEBUG

redis.cache.max.total=160
redis.cache.max.idle=80
redis.cache.min.idle=40
redis.cache.num.tests.per.eviction.run=50
redis.cache.eviction.run.interval=120000
redis.cache.min.evictable.idle.time=300000
redis.cache.read.timeout=8000
redis.cache.max.wait=3000
redis.cache.ttl.seconds=600
                                                                                                                                                                           
